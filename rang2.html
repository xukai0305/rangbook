<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LangBook - 언어 학습 노트</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pinyin-pro@3.19.6/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f7fa;
            font-family: 'Malgun Gothic', '맑은 고딕', system-ui, sans-serif;
            padding: 2rem 1rem;
            color: #2c3e4e;
        }
        .container { max-width: 820px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px dashed steelblue;
            padding-bottom: 0.75rem;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }
        .header .lang {
            font-style: italic;
            color: steelblue;
        }
        .header .book {
            color: yellowgreen;
        }
        .header p { color: #8aaec0; font-size: 0.7rem; margin-top: 4px; }
        
        .card, .search-bar {
            border: 2px dashed steelblue;
            background: #ffffff;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .search-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #cfdfe9;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .small-block {
            background: #ffffff;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: 0.1s;
            border: 2px dashed steelblue;
        }
        .small-block:hover {
            background: #f4f9fe;
            border-color: #bdd3e0;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .row label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #6f8ea0;
            min-width: 70px;
        }
        select, .line-btns {
            border: 1px solid #cfdfe9;
            border-radius: 30px;
            padding: 6px 14px;
            background: #fefefe;
            font-size: 0.8rem;
        }
        .line-btns button {
            background: none;
            border: none;
            padding: 4px 14px;
            margin: 0 2px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .line-btns button.active {
            background: #e2edf2;
            border: 1px solid #c0d4e0;
        }
        textarea {
            width: 100%;
            border: 1px solid #cfdfe9;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
            background: #fefcf8;
            font-family: inherit;
            resize: vertical;
        }
        .preview-area {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .preview-title {
            font-size: 0.7rem;
            color: #8aaec0;
            margin-bottom: 10px;
        }
        .preview-line {
            padding: 8px 0;
            border-bottom: 1px dashed #e2eaf0;
        }
        .slider-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            margin: 12px 0;
        }
        .slider-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f9fbfd;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #e2eaf0;
        }
        .btn {
            background: none;
            border: 1px solid #cbdbe0;
            padding: 8px 22px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-primary {
            background: #eef2fa;
            border-color: #bdd3e0;
        }
        .btn-primary:hover { background: #e2eaf3; }
        
        .small-blocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .small-block .small-original {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .small-block .small-preview {
            font-size: 0.7rem;
            color: #8aaec0;
            margin-top: 6px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: none;
            border: 1px solid #cfdfe9;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        .page-btn.active {
            background: #e2edf2;
            border-color: #bdd3e0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 5px;
            max-width: 750px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
            border-left: 13px solid steelblue;
            border: 2px dashed steelblue;
        }
        .close-modal {
            position: absolute;
            top: 12px; right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #8aaec0;
        }
        
        .block-capture-area {
            padding: 20px;
        }
        .original-section {
            background: #f4f9fe;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .original-text {
            font-size: 1.3rem;
            font-weight: 500;
            line-height: 1.4;
        }
        .pronunciation-text {
            font-size: 0.8rem;
            font-family: monospace;
            color: #7e9eb0;
            margin-top: 6px;
        }
        .translation-section {
            background: #ffffff;
            border: 1px solid #e0eaf0;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 16px;
        }
        .translation-text {
            font-size: 0.85rem;
            color: #4a6f8a;
            min-height: 40px;
        }
        .writing-section {
            background: #ffffff;
            border-radius: 12px;
            padding: 14px 16px;
            margin: 12px 0;
        }
        .writing-lines { margin: 8px 0; }
        .writing-line {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 10px 8px;
            border-bottom: 1px solid #f0e8d8;
        }
        .writing-line .line-number {
            font-size: 0.7rem;
            color: #c9b696;
            width: 28px;
        }
        .writing-line .line-text {
            flex: 1;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        .words-section { margin: 16px 0 8px; }
        .word-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
        }
        .word-rect {
            background: #fef7e0;
            border: 1px solid #f0e2c0;
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            min-width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .word-rect .word-circle {
            font-size: 1rem;
            margin-bottom: 4px;
            color: #e67e22;
        }
        .word-rect .word-main {
            font-size: 1rem;
            font-weight: 600;
            color: #b8860b;
        }
        .word-rect .word-pron {
            font-size: 0.7rem;
            font-family: monospace;
            color: #8f8a6b;
            margin: 2px 0;
        }
        .word-rect .word-meaning { 
            font-size: 0.65rem; 
            color: #b0a078;
        }
        
        .modal-controls {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 2px solid #e2eaf0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .word-manager {
            margin-top: 14px;
            padding: 12px;
            background: #f9fbfd;
            border-radius: 12px;
            border: 2px dashed steelblue;
        }
        .word-manager input {
            border: 1px solid #cfdfe9;
            border-radius: 30px;
            padding: 8px 12px;
            font-size: 0.75rem;
        }
        .font-upload-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .bottom-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        [contenteditable="true"]:focus {
            outline: none;
            background: #fffef7;
        }
        input[type="range"] { width: 130px; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e4e;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        .search-info {
            font-size: 0.7rem;
            color: #8aaec0;
            margin-left: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><span class="lang">Lang</span><span class="book">Book</span></h1>
        <p>language writing notebook</p>
    </div>
    
    <div class="search-bar">
        <i data-lucide="search"></i>
        <input type="text" id="searchInput" placeholder="🔍 블록 검색 (원문 또는 단어)">
        <span id="searchResultCount" class="search-info"></span>
        <button class="btn" id="clearSearchBtn" style="padding:6px 16px;">✖️ 초기화</button>
    </div>
    
    <div class="card">
        <div class="row">
            <label>언어</label>
            <select id="langSelect">
                <option value="zh">中文 (중국어)</option>
                <option value="en">English (영어)</option>
                <option value="ja">日本語 (일본어)</option>
                <option value="ko">한국어</option>
            </select>
            <label>따라쓰기 줄</label>
            <div class="line-btns" id="previewLineBtns">
                <button data-lines="2">2</button>
                <button data-lines="3" class="active">3</button>
                <button data-lines="4">4</button>
            </div>
        </div>
        <div class="row">
            <label>원문</label>
            <textarea id="newOriginal" rows="2" placeholder="문장을 입력하세요 (예: 你好，今天天气很好)"></textarea>
        </div>
        <div class="preview-area">
            <div class="preview-title">✍️ 따라쓰기 미리보기</div>
            <div id="previewLinesContainer"></div>
        </div>
        <div class="slider-group">
            <div class="slider-item">
                <span>🎨 투명도</span>
                <input type="range" id="previewOpacity" min="10" max="90" value="40">
                <span id="opacityVal">40%</span>
            </div>
            <div class="slider-item">
                <span>🔤 글자 크기</span>
                <input type="range" id="previewFontSize" min="12" max="36" value="28">
                <span id="fontSizeVal">28px</span>
            </div>
            <div class="slider-item font-upload-area">
                <span>📁 폰트</span>
                <select id="fontSelect">
                    <option value="'Noto Sans CJK KR', 'Noto Sans CJK SC', 'Malgun Gothic'">기본 폰트 (노토산스)</option>
                    <option value="'SimHei', 'Microsoft YaHei'">SimHei</option>
                    <option value="'PingFang SC'">PingFang</option>
                    <option value="'KaiTi', '楷体'">楷体</option>
                </select>
                <input type="file" id="fontUpload" accept=".ttf,.otf,.woff" style="display:none">
                <button class="btn" id="uploadFontBtn" style="padding:4px 12px;">📂 업로드</button>
                <button class="btn" id="applyFontBtn" style="padding:4px 12px;">✨ 적용</button>
            </div>
        </div>
        <div style="display:flex; justify-content: flex-end;">
            <button class="btn btn-primary" id="createBlockBtn"><i data-lucide="plus"></i> 블록 생성</button>
        </div>
    </div>
    
    <div id="smallBlocksContainer" class="small-blocks-grid"></div>
    <div id="paginationContainer" class="pagination"></div>
    
    <div class="bottom-bar">
        <button class="btn" id="exportAllBtn"><i data-lucide="download"></i> 내보내기</button>
        <button class="btn" id="importBtn"><i data-lucide="upload"></i> 불러오기</button>
        <button class="btn" id="cloudBackupBtn"><i data-lucide="cloud"></i> ☁️ 클라우드 저장</button>
        <button class="btn" id="cloudLoadBtn"><i data-lucide="cloud-download"></i> ☁️ 클라우드 불러오기</button>
        <button class="btn" id="cloudNewBtn"><i data-lucide="cloud-plus"></i> ☁️ 새 공간에 저장</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
</div>

<div id="blockModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBlockContent"></div>
        <div class="modal-controls">
            <button class="btn" id="modalSaveBtn"><i data-lucide="camera"></i> 저장</button>
            <button class="btn" id="modalDeleteBtn"><i data-lucide="trash-2"></i> 삭제</button>
        </div>
        <div id="modalWordManager" class="word-manager" style="margin-top:12px;">
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <input type="text" placeholder="단어" id="modalNewWord" style="flex:1;">
                <input type="text" placeholder="발음" id="modalNewPron" style="flex:1;">
                <input type="text" placeholder="뜻" id="modalNewMeaning" style="flex:1;">
                <button class="btn" id="modalAddWordBtn">+ 추가</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    lucide.createIcons();

    // ================= JSONbin 설정 =================
    // ⚠️ 여기에 새로 발급받은 API 키를 넣으세요! ⚠️
    const JSONBIN_API_KEY = "$2a$10$/FXh/Agpz01vjrcmEic7wugXaICmT9cXP68MXB3uwRu.asgw6h4NS";  // ← 이 부분을 새 키로 교체!
    let currentBinId = localStorage.getItem('langbook_bin_id') || "69d5342136566621a88a3c07";

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    function getPronunciation(text, lang) {
        if (!text) return '';
        if (lang === 'zh') {
            try { return window.pinyinPro.pinyin(text, { toneType: 'symbol' }); } catch(e) { return text; }
        } else { return ''; }
    }

    // 단어 추출 함수 (최대 10개)
    const STOP_WORDS = new Set([
        '的', '了', '是', '在', '我', '你', '他', '她', '它', '我们', '你们', '这', '那', '有', '和',
        'the', 'be', 'to', 'of', 'and', 'a', 'in', 'that', 'have', 'i', 'it', 'for', 'not',
        'の', 'に', 'は', 'を', 'た', 'が', 'で', 'ます', 'です'
    ]);

    function extractWords(text, lang) {
        if (!text) return [];
        let words = [];
        
        if (lang === 'zh') {
            const chinese = text.match(/[\u4e00-\u9fa5]+/g);
            if (!chinese) return [];
            let freq = new Map();
            for (let chunk of chinese) {
                for (let len = 2; len <= 4; len++) {
                    for (let i = 0; i <= chunk.length - len; i++) {
                        const word = chunk.substr(i, len);
                        if (!STOP_WORDS.has(word) && word.length >= 2) {
                            freq.set(word, (freq.get(word) || 0) + 1);
                        }
                    }
                }
            }
            words = Array.from(freq.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(([w]) => ({ word: w, pronunciation: getPronunciation(w, 'zh'), meaning: '' }));
        } else {
            const rawWords = text.toLowerCase().match(/[a-z]+/g) || text.split(/\s+/);
            let freq = new Map();
            for (let w of rawWords) {
                if (!STOP_WORDS.has(w) && w.length >= 2) {
                    freq.set(w, (freq.get(w) || 0) + 1);
                }
            }
            words = Array.from(freq.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(([w]) => ({ word: w, pronunciation: '', meaning: '' }));
        }
        return words;
    }

    let allBlocks = [];
    let filteredBlocks = [];
    let nextId = 1;
    const STORAGE_KEY = 'langbook_data';
    let currentFontFamily = "'Noto Sans CJK KR', 'Noto Sans CJK SC', 'Malgun Gothic'";
    let currentLang = 'zh';
    let currentPage = 1;
    let currentModalBlock = null;
    let currentSearchTerm = '';
    const PAGE_SIZE = 30;

    function filterBlocks() {
        const term = currentSearchTerm.trim().toLowerCase();
        if (!term) {
            filteredBlocks = [...allBlocks];
        } else {
            filteredBlocks = allBlocks.filter(block => 
                block.original.toLowerCase().includes(term) ||
                block.words.some(w => w.word.toLowerCase().includes(term))
            );
        }
        currentPage = 1;
        updateSearchResultCount();
        renderSmallBlocks();
    }

    function updateSearchResultCount() {
        const countSpan = document.getElementById('searchResultCount');
        if (currentSearchTerm) {
            countSpan.textContent = `🔍 ${filteredBlocks.length}개 검색됨`;
        } else {
            countSpan.textContent = `📚 총 ${allBlocks.length}개 블록`;
        }
    }

    function updatePreview() {
        const text = document.getElementById('newOriginal').value;
        const lines = parseInt(document.querySelector('#previewLineBtns .active').dataset.lines);
        const opacity = parseInt(document.getElementById('previewOpacity').value) / 100;
        const fontSize = parseInt(document.getElementById('previewFontSize').value);
        const fontFamily = document.getElementById('fontSelect').value;
        const container = document.getElementById('previewLinesContainer');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < lines; i++) {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'preview-line';
            lineDiv.style.opacity = opacity;
            lineDiv.style.fontSize = fontSize + 'px';
            lineDiv.style.fontFamily = fontFamily;
            lineDiv.innerText = text || '(문장을 입력하세요)';
            container.appendChild(lineDiv);
        }
    }

    document.getElementById('newOriginal').addEventListener('input', updatePreview);
    document.getElementById('previewOpacity').addEventListener('input', (e) => {
        document.getElementById('opacityVal').innerText = e.target.value + '%';
        updatePreview();
    });
    document.getElementById('previewFontSize').addEventListener('input', (e) => {
        document.getElementById('fontSizeVal').innerText = e.target.value + 'px';
        updatePreview();
    });
    document.querySelectorAll('#previewLineBtns button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#previewLineBtns button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updatePreview();
        });
    });

    document.getElementById('uploadFontBtn').addEventListener('click', () => {
        document.getElementById('fontUpload').click();
    });
    document.getElementById('fontUpload').addEventListener('change', (e) => {
        if (e.target.files.length) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const fontName = 'custom_' + Date.now();
                const style = document.createElement('style');
                style.textContent = `@font-face { font-family: '${fontName}'; src: url('${ev.target.result}'); }`;
                document.head.appendChild(style);
                const select = document.getElementById('fontSelect');
                const option = document.createElement('option');
                option.value = `'${fontName}'`;
                option.textContent = file.name;
                select.appendChild(option);
                select.value = `'${fontName}'`;
                currentFontFamily = `'${fontName}'`;
                updatePreview();
                showToast('폰트 업로드 완료!');
            };
            reader.readAsDataURL(file);
        }
    });
    document.getElementById('applyFontBtn').addEventListener('click', async () => {
        currentFontFamily = document.getElementById('fontSelect').value;
        updatePreview();
        showToast('폰트가 적용되었습니다.');
    });
    document.getElementById('langSelect').addEventListener('change', (e) => {
        currentLang = e.target.value;
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearchTerm = e.target.value;
        filterBlocks();
    });
    document.getElementById('clearSearchBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        currentSearchTerm = '';
        filterBlocks();
    });

    function showBlockModal(block) {
        currentModalBlock = block;
        const modalContent = document.getElementById('modalBlockContent');
        modalContent.innerHTML = '';
        
        const captureDiv = document.createElement('div');
        captureDiv.className = 'block-capture-area';
        captureDiv.style.fontFamily = block.fontFamily || currentFontFamily;
        
        const originalSection = document.createElement('div');
        originalSection.className = 'original-section';
        const originalDiv = document.createElement('div');
        originalDiv.className = 'original-text';
        originalDiv.setAttribute('contenteditable', 'true');
        originalDiv.innerText = block.original;
        originalDiv.addEventListener('blur', (e) => {
            const newVal = e.target.innerText;
            if (newVal !== block.original) {
                block.original = newVal;
                block.pronunciation = getPronunciation(newVal, block.lang);
                block.words = extractWords(newVal, block.lang);
                filterBlocks();
                showBlockModal(block);
            }
        });
        const pronDiv = document.createElement('div');
        pronDiv.className = 'pronunciation-text';
        pronDiv.setAttribute('contenteditable', 'true');
        pronDiv.innerText = block.pronunciation;
        pronDiv.addEventListener('blur', (e) => { block.pronunciation = e.target.innerText; saveToLocal(); });
        originalSection.appendChild(originalDiv);
        originalSection.appendChild(pronDiv);
        captureDiv.appendChild(originalSection);
        
        const transSection = document.createElement('div');
        transSection.className = 'translation-section';
        const transDiv = document.createElement('div');
        transDiv.className = 'translation-text';
        transDiv.setAttribute('contenteditable', 'true');
        transDiv.innerText = block.translation || '';
        transDiv.addEventListener('blur', (e) => { block.translation = e.target.innerText; saveToLocal(); });
        transSection.appendChild(transDiv);
        captureDiv.appendChild(transSection);
        
        const writingSection = document.createElement('div');
        writingSection.className = 'writing-section';
        const writingDiv = document.createElement('div');
        writingDiv.className = 'writing-lines';
        const baseOpacity = block.opacity;
        for (let i = 0; i < block.writingLines; i++) {
            const stepOpacity = Math.max(0.2, baseOpacity - (i * 0.1));
            const lineDiv = document.createElement('div');
            lineDiv.className = 'writing-line';
            const numSpan = document.createElement('span');
            numSpan.className = 'line-number';
            numSpan.innerText = `${i + 1}`;
            const textSpan = document.createElement('span');
            textSpan.className = 'line-text';
            textSpan.style.opacity = stepOpacity;
            textSpan.style.fontSize = block.fontSize + 'px';
            textSpan.innerText = block.original;
            lineDiv.appendChild(numSpan);
            lineDiv.appendChild(textSpan);
            writingDiv.appendChild(lineDiv);
        }
        writingSection.appendChild(writingDiv);
        captureDiv.appendChild(writingSection);
        
        const wordsSection = document.createElement('div');
        wordsSection.className = 'words-section';
        const wordContainer = document.createElement('div');
        wordContainer.className = 'word-grid';
        block.words.forEach((w, idx) => {
            const rect = document.createElement('div');
            rect.className = 'word-rect';
            rect.innerHTML = `<div class="word-circle">○</div><div class="word-main">${w.word}</div><div class="word-pron">${w.pronunciation || ''}</div><div class="word-meaning">${w.meaning || ''}</div>`;
            rect.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                block.words.splice(idx, 1); 
                saveToLocal();              
                filterBlocks(); 
                showBlockModal(block); 
            });
            wordContainer.appendChild(rect);
        });
        wordsSection.appendChild(wordContainer);
        captureDiv.appendChild(wordsSection);
        
        modalContent.appendChild(captureDiv);
        lucide.createIcons();
        document.getElementById('blockModal').style.display = 'flex';
    }
    
    document.querySelector('.close-modal').addEventListener('click', () => {
        document.getElementById('blockModal').style.display = 'none';
        currentModalBlock = null;
    });
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('blockModal');
        if (e.target === modal) {
            modal.style.display = 'none';
            currentModalBlock = null;
        }
    });
    
    document.getElementById('modalSaveBtn').addEventListener('click', async () => {
        if (!currentModalBlock) return;
        const captureElem = document.querySelector('#modalBlockContent .block-capture-area');
        if (!captureElem) return;
        try {
            const canvas = await html2canvas(captureElem, { scale: 2, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `langbook_${currentModalBlock.id}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('저장 완료!');
        } catch (e) { alert('저장 실패'); }
    });
    
    document.getElementById('modalDeleteBtn').addEventListener('click', () => {
        if (!currentModalBlock) return;
        allBlocks = allBlocks.filter(b => b.id !== currentModalBlock.id);
        saveToLocal();
        filterBlocks();
        document.getElementById('blockModal').style.display = 'none';
        currentModalBlock = null;
        showToast('블록이 삭제되었습니다.');
    });
    
    document.getElementById('modalAddWordBtn').addEventListener('click', () => {
        if (!currentModalBlock) return;
        const w = document.getElementById('modalNewWord').value.trim();
        const p = document.getElementById('modalNewPron').value.trim();
        const m = document.getElementById('modalNewMeaning').value.trim();
        if (w) {
            currentModalBlock.words.push({ word: w, pronunciation: p, meaning: m });
            saveToLocal();
            filterBlocks();
            showBlockModal(currentModalBlock);
            document.getElementById('modalNewWord').value = '';
            document.getElementById('modalNewPron').value = '';
            document.getElementById('modalNewMeaning').value = '';
            showToast('단어가 추가되었습니다.');
        }
    });

    function renderSmallBlocks() {
        if (filteredBlocks.length === 0) {
            document.getElementById('smallBlocksContainer').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px; color:#8aaec0;">✨ 블록을 생성해보세요!</div>';
            document.getElementById('paginationContainer').innerHTML = '';
            return;
        }
        const totalPages = Math.ceil(filteredBlocks.length / PAGE_SIZE);
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageBlocks = filteredBlocks.slice(start, start + PAGE_SIZE);
        const container = document.getElementById('smallBlocksContainer');
        container.innerHTML = '';
        for (let block of pageBlocks) {
            const smallDiv = document.createElement('div');
            smallDiv.className = 'small-block';
            smallDiv.setAttribute('data-id', block.id);
            smallDiv.innerHTML = `<div class="small-original">${block.original.substring(0, 28)}${block.original.length > 28 ? '…' : ''}</div><div class="small-preview">📝 ${block.writingLines}줄 · ${block.words.length}단어</div>`;
            smallDiv.addEventListener('click', () => showBlockModal(block));
            container.appendChild(smallDiv);
        }
        const pageContainer = document.getElementById('paginationContainer');
        pageContainer.innerHTML = '';
        if (totalPages > 1) {
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
                btn.addEventListener('click', () => { currentPage = i; renderSmallBlocks(); });
                pageContainer.appendChild(btn);
            }
        }
    }

    async function createNewBlock() {
        const text = document.getElementById('newOriginal').value.trim();
        if (!text) { alert('문장을 입력하세요'); return; }
        const lines = parseInt(document.querySelector('#previewLineBtns .active').dataset.lines);
        const opacity = parseInt(document.getElementById('previewOpacity').value) / 100;
        const fontSize = parseInt(document.getElementById('previewFontSize').value);
        const lang = document.getElementById('langSelect').value;
        showToast('🌐 번역 중...');
        const translation = await autoTranslate(text, lang);
        const newBlock = {
            id: nextId++,
            original: text,
            pronunciation: getPronunciation(text, lang),
            translation: translation,
            words: extractWords(text, lang),
            writingLines: lines,
            opacity: opacity,
            fontSize: fontSize,
            fontFamily: currentFontFamily,
            lang: lang,
        };
        allBlocks.unshift(newBlock); 
        filterBlocks();
        document.getElementById('newOriginal').value = '';
        updatePreview();
        saveToLocal();
        showToast('새 블록이 생성되었습니다.');
    }

    function saveToLocal() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allBlocks)); 
        updateSearchResultCount();
    }
    
    function loadFromLocal() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            allBlocks = JSON.parse(saved);
            if (allBlocks.length > 0) {
                const maxId = allBlocks.reduce((a, b) => Math.max(a.id, b.id), 0);
                nextId = maxId + 1;
            }
            filterBlocks();
        }
    }
    
    function exportData() {
        const blob = new Blob([JSON.stringify(allBlocks, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.download = `langbook_${Date.now()}.json`;
        a.href = URL.createObjectURL(blob);
        a.click();
        showToast('데이터를 내보냈습니다.');
    }
    
    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            allBlocks = JSON.parse(e.target.result);
            const maxId = allBlocks.reduce((a, b) => Math.max(a.id, b.id), 0);
            nextId = maxId + 1;
            filterBlocks();
            saveToLocal();
            showToast('데이터를 불러왔습니다.');
        };
        reader.readAsText(file);
    }

    async function autoTranslate(text, lang) {
        if (!text || !text.trim()) return '';
        const langMap = { zh: 'zh', ja: 'ja', en: 'en', ko: 'ko' };
        const from = langMap[lang] || 'zh';
        if (from === 'ko') return '';
        try {
            const res = await fetch(
                `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|ko`
            );
            const data = await res.json();
            if (data.responseStatus === 200) return data.responseData.translatedText;
        } catch(e) {}
        return '';
    }

    // ================= JSONbin 클라우드 함수 =================
    async function cloudBackup() {
        if (JSONBIN_API_KEY === "YOUR_NEW_API_KEY") {
            showToast('❌ 먼저 API 키를 설정해주세요! (코드 상단 참고)');
            return;
        }
        
        try {
            showToast('☁️ 클라우드 저장 중...');
            const data = { 
                blocks: allBlocks, 
                timestamp: new Date().toISOString(),
                version: '1.0'
            };
            
            let response;
            
            if (currentBinId) {
                // 기존 bin 업데이트
                response = await fetch(`https://api.jsonbin.io/v3/b/${currentBinId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(data)
                });
            } else {
                // 새 bin 생성
                response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(data)
                });
            }
            
            const result = await response.json();
            
            if (response.ok) {
                if (!currentBinId && result.metadata && result.metadata.id) {
                    currentBinId = result.metadata.id;
                    localStorage.setItem('langbook_bin_id', currentBinId);
                    showToast('☁️ 새 클라우드에 저장 완료!');
                } else {
                    showToast('☁️ 클라우드 저장 완료!');
                }
            } else {
                throw new Error(result.message || '저장 실패');
            }
        } catch (error) {
            console.error('클라우드 저장 오류:', error);
            showToast('❌ 클라우드 저장 실패: ' + error.message);
        }
    }

    async function cloudLoad() {
        if (JSONBIN_API_KEY === "YOUR_NEW_API_KEY") {
            showToast('❌ 먼저 API 키를 설정해주세요!');
            return;
        }
        
        try {
            showToast('☁️ 클라우드 불러오는 중...');
            
            if (!currentBinId) {
                showToast('저장된 클라우드 데이터가 없습니다. 먼저 저장해주세요.');
                return;
            }
            
            const response = await fetch(`https://api.jsonbin.io/v3/b/${currentBinId}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            
            if (!response.ok) {
                if (response.status === 404) {
                    localStorage.removeItem('langbook_bin_id');
                    currentBinId = null;
                    throw new Error('데이터를 찾을 수 없습니다');
                }
                throw new Error(`HTTP ${response.status}`);
            }
            
            const result = await response.json();
            
            if (result.record && result.record.blocks) {
                allBlocks = result.record.blocks;
                const maxId = allBlocks.reduce((a, b) => Math.max(a.id, b.id), 0);
                nextId = maxId + 1;
                filterBlocks();
                saveToLocal();
                showToast(`☁️ 불러오기 완료! (${allBlocks.length}개 블록)`);
            } else if (result.record) {
                allBlocks = result.record;
                const maxId = allBlocks.reduce((a, b) => Math.max(a.id, b.id), 0);
                nextId = maxId + 1;
                filterBlocks();
                saveToLocal();
                showToast(`☁️ 불러오기 완료! (${allBlocks.length}개 블록)`);
            } else {
                throw new Error('데이터 형식 오류');
            }
        } catch (error) {
            console.error('클라우드 불러오기 오류:', error);
            showToast('❌ 불러오기 실패: ' + error.message);
        }
    }
    
    async function cloudNewBackup() {
        if (confirm('새로운 클라우드 공간에 저장하시겠습니까? (기존 데이터는 유지됩니다)')) {
            localStorage.removeItem('langbook_bin_id');
            currentBinId = null;
            await cloudBackup();
        }
    }

    document.getElementById('createBlockBtn').addEventListener('click', createNewBlock);
    document.getElementById('exportAllBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', (e) => importData(e.target.files[0]));
    document.getElementById('cloudBackupBtn').addEventListener('click', cloudBackup);
    document.getElementById('cloudLoadBtn').addEventListener('click', cloudLoad);
    document.getElementById('cloudNewBtn').addEventListener('click', cloudNewBackup);

    updatePreview();
    loadFromLocal();
    if (allBlocks.length === 0) {
        const sample = '你好，今天天气很好';
        allBlocks.push({
            id: nextId++, original: sample, pronunciation: getPronunciation(sample, 'zh'),
            translation: '안녕하세요, 오늘 날씨가 좋습니다', words: extractWords(sample, 'zh'), 
            writingLines: 3, opacity: 0.4, fontSize: 28,
            fontFamily: currentFontFamily, lang: 'zh'
        });
        filterBlocks();
        saveToLocal();
    }
</script>
